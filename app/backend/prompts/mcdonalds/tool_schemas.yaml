version: "1.0.0"
brand: "mcdonalds"

tools:
  - name: "search"
    type: "function"
    description: >
      Search the McDonald's menu knowledge base. The knowledge base is in English,
      translate to and from English if needed. Results are formatted as a source name
      first in square brackets, followed by the text content, and a line with '-----'
      at the end of each result.
    parameters:
      type: "object"
      properties:
        query:
          type: "string"
          description: "Search query for McDonald's menu items"
      required:
        - "query"
      additionalProperties: false

  - name: "update_order"
    type: "function"
    description: "Update the current McDonald's order by adding or removing items."
    parameters:
      type: "object"
      properties:
        action:
          type: "string"
          description: "Action to perform: 'add' or 'remove'."
          enum:
            - "add"
            - "remove"
        item_name:
          type: "string"
          description: "Name of the item to update, e.g., 'Big Mac'."
        size:
          type: "string"
          description: "Size of the item to update, e.g., 'Large'."
        quantity:
          type: "integer"
          description: "Quantity of the item to update. Represents the number of items."
        price:
          type: "number"
          description: >
            Price of a single item to add. Required only for 'add' action.
            Note: This is the price per individual item, not the total price for the quantity.
      required:
        - "action"
        - "item_name"
        - "size"
        - "quantity"
      additionalProperties: false

  - name: "get_order"
    type: "function"
    description: "Retrieve the current McDonald's order summary to read back to the guest."
    parameters:
      type: "object"
      properties: {}
      required: []
      additionalProperties: false

  - name: "reset_order"
    type: "function"
    description: "Clear all items from the current McDonald's order and start fresh."
    parameters:
      type: "object"
      properties: {}
      required: []
      additionalProperties: false
