version: "1.0.0"
upsell_hints:
  combo:
    trigger_categories:
      - "combos"
    hint: "Combos are a great base! Ask if they want to upgrade to a Large size, or add a delicious McFlurry or Dessert!"

  burger:
    trigger_categories:
      - "burgers"
      - "burgers & sandwiches"
      - "chicken"
    hint: "Perfect choice! Ask if they want to make it a combo meal with World Famous Fries and a refreshing Drink!"

  drink:
    trigger_categories:
      - "drinks"
      - "mccafe"
    hint: "Great drink choice! Ask if they want to add a Flavor Add-In to customize it, or pair it with a tasty side!"

  shake:
    trigger_categories:
      - "shakes"
      - "desserts"
    hint: "Yum! Shakes are perfect on their own, but ask if they'd like to add Whipped Cream or pair with a snack!"

  side:
    trigger_categories:
      - "sides"
    hint: "Tasty! Ask if they want to add a refreshing Drink to complete their meal!"

  generic:
    trigger_categories: []
    hint: "Ask if they'd like to add anything else — maybe a drink, side, or dessert!"

system_hints:
  combo_incomplete: "SYSTEM HINT: {{prompt_hint}}"
  out_of_stock: "OOS: {{oos_reason}}"
  happy_hour_active: "HAPPY HOUR ACTIVE: drinks are half-price!"

delta_templates:
  item_added: "Added {{quantity}} {{display_name}} — your total is now ${{total}}"
  item_removed: "Removed {{quantity}} {{display_name}} — your total is now ${{total}}"
